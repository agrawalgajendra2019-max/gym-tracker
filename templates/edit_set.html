{% extends 'base.html' %}

{% block content %}

<div class="card">

    <h2>Edit Set</h2>

    <form method="POST">

        <label>Weight</label>
        <input type="number" step="0.1" name="weight" value="{{ set_log.weight }}">

        <label>Reps</label>
        <input type="number" name="reps" value="{{ set_log.reps }}">

        <button type="submit" class="btn">Save Changes</button>

    </form>

</div>

{% endblock %}
