{% extends 'base.html' %}

{% block content %}

<div class="card">

    <h2>Import CSV</h2>

    <form method="POST" enctype="multipart/form-data">

        <input type="file" name="file" accept=".csv" required>

        <br><br>

        <button type="submit" class="btn">Upload & Import</button>

    </form>

</div>

{% endblock %}
